<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>快乐学习园地 - 幼儿全能学习系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5b4cdb;
            --primary-light: #8c7df7;
            --primary-dark: #4338ca;
            --secondary: #10b981;
            --secondary-light: #34d399;
            --tertiary: #ef4444;
            --tertiary-light: #f87171;
            --accent: #f97316;
            --accent-light: #fbbf24;
            --bg-gradient: linear-gradient(135deg, #7c3aed 0%, #4f46e5 50%, #1d4ed8 100%);
            --card-bg: rgba(255, 255, 255, 0.98);
            --shadow-soft: 0 12px 40px rgba(31, 38, 135, 0.12);
            --shadow-medium: 0 24px 70px rgba(0, 0, 0, 0.18);
            --shadow-hard: 0 36px 90px rgba(0, 0, 0, 0.25);
            --radius-small: 24px;
            --radius-medium: 36px;
            --radius-large: 50px;
            --transition-fast: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-medium: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html {
            font-size: 62.5%;
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 24px;
            color: #333;
            line-height: 1.6;
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            animation: floatParticle 22s infinite linear;
        }
        
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        
        .container {
            width: 100%;
            max-width: 1280px;
            min-height: 88vh;
            background: var(--card-bg);
            border-radius: var(--radius-large);
            box-shadow: var(--shadow-hard);
            overflow: hidden;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 5rem 4rem 4rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
            animation: rotate 25s linear infinite;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2.4rem;
            margin-bottom: 2.4rem;
        }
        
        .logo {
            width: 9rem;
            height: 9rem;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.2rem;
            color: white;
            box-shadow: 0 12px 36px rgba(249, 115, 22, 0.35);
            transform: rotate(-5deg);
            animation: logoFloat 3.2s ease-in-out infinite;
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-1.2rem) rotate(-5deg); }
        }
        
        .title-container h1 {
            font-size: 4.8rem;
            color: white;
            margin-bottom: 1.2rem;
            font-weight: 700;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.25);
            letter-spacing: 1.2px;
        }
        
        .title-container .subtitle {
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 500;
            max-width: 650px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.4rem 3.6rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .control-group {
            display: flex;
            gap: 1.8rem;
            align-items: center;
        }
        
        .control-btn {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            width: 5rem;
            height: 5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            color: var(--primary);
            font-size: 2.2rem;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
        }
        
        .control-btn:hover {
            transform: translateY(-3px) scale(1.12);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            background: white;
        }
        
        .control-btn:active {
            transform: translateY(0) scale(0.96);
        }
        
        .sound-btn.active {
            background: var(--secondary);
            color: white;
        }
        
        .progress-info {
            text-align: center;
        }
        
        .progress-text {
            font-size: 1.5rem;
            color: white;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }
        
        .progress-bar-container {
            width: 220px;
            height: 8px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary-light), var(--accent-light));
            width: 0%;
            transition: width var(--transition-medium);
            position: relative;
            overflow: hidden;
        }
        
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: shimmer 2.2s infinite;
        }
        
        .main-content {
            flex: 1;
            padding: 5rem 4rem;
            position: relative;
            min-height: 60vh;
        }
        
        .screen {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: screenEnter 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes screenEnter {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .active {
            display: flex;
        }
        
        .welcome-container {
            text-align: center;
            max-width: 900px;
            width: 100%;
        }
        
        .welcome-title {
            font-size: 4.5rem;
            color: var(--primary);
            margin-bottom: 2.4rem;
            font-weight: 700;
            position: relative;
            display: inline-block;
        }
        
        .welcome-title::after {
            content: '';
            position: absolute;
            bottom: -1.2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
        }
        
        .welcome-text {
            font-size: 2.2rem;
            color: #555;
            margin-bottom: 4.8rem;
            line-height: 1.8;
            padding: 0 2.4rem;
        }
        
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 3.6rem;
            width: 100%;
            margin-bottom: 5rem;
        }
        
        .level-card {
            background: white;
            border-radius: var(--radius-medium);
            padding: 3.6rem 2.4rem;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-medium);
            box-shadow: var(--shadow-soft);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .level-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }
        
        .level-card:hover {
            transform: translateY(-12px) scale(1.06);
            box-shadow: var(--shadow-medium);
            border-color: var(--primary-light);
        }
        
        .level-card:active {
            transform: translateY(-6px) scale(1.03);
        }
        
        .level-icon {
            width: 9rem;
            height: 9rem;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.4rem;
            font-size: 4rem;
            color: white;
            box-shadow: 0 12px 24px rgba(91, 76, 219, 0.25);
        }
        
        .level-name {
            font-size: 2.4rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 1.2rem;
        }
        
        .level-desc {
            font-size: 1.7rem;
            color: #777;
            margin-bottom: 1.8rem;
        }
        
        .level-stats {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            color: var(--accent);
            font-size: 1.5rem;
        }
        
        .start-button {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-light));
            color: white;
            border: none;
            padding: 2rem 5rem;
            font-size: 2.2rem;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            transition: all var(--transition-medium);
            box-shadow: 0 12px 36px rgba(16, 185, 129, 0.35);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin: 0 auto;
        }
        
        .start-button:hover {
            transform: translateY(-4px) scale(1.06);
            box-shadow: 0 18px 45px rgba(16, 185, 129, 0.45);
        }
        
        .start-button:active {
            transform: translateY(-1px) scale(1.02);
        }
        
        .game-container {
            width: 100%;
            max-width: 950px;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 4.8rem;
        }
        
        .game-title {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1.2rem;
            font-weight: 700;
        }
        
        .game-level {
            font-size: 2rem;
            color: var(--secondary);
            font-weight: 600;
        }
        
        .question-box {
            background: white;
            border-radius: var(--radius-medium);
            padding: 4.8rem 3.6rem;
            margin-bottom: 4.8rem;
            box-shadow: var(--shadow-soft);
            border: 3px solid rgba(91, 76, 219, 0.12);
            position: relative;
            overflow: hidden;
        }
        
        .question-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent, rgba(91, 76, 219, 0.03), transparent);
            pointer-events: none;
        }
        
        .question-text {
            font-size: 3.2rem;
            color: #222;
            text-align: center;
            line-height: 1.5;
            font-weight: 600;
            margin-bottom: 0;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 3rem;
            width: 100%;
        }
        
        .option-card {
            background: white;
            border-radius: var(--radius-medium);
            padding: 3.6rem 2.4rem;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-soft);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .option-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-medium);
            border-color: var(--primary-light);
        }
        
        .option-content {
            font-size: 7rem;
            margin-bottom: 2rem;
        }
        
        .option-label {
            font-size: 2.4rem;
            color: var(--primary);
            font-weight: 600;
        }
        
        .option-card.selected {
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            border-color: var(--primary);
            color: white;
        }
        
        .option-card.selected .option-label {
            color: white;
        }
        
        .option-card.correct {
            background: linear-gradient(135deg, var(--secondary-light), var(--secondary));
            border-color: var(--secondary);
            color: white;
            animation: celebrate 0.8s ease;
        }
        
        .option-card.incorrect {
            background: linear-gradient(135deg, var(--tertiary-light), var(--tertiary));
            border-color: var(--tertiary);
            color: white;
            animation: shake 0.5s ease;
        }
        
        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-12px); }
            75% { transform: translateX(12px); }
        }
        
        .game-controls {
            display: flex;
            justify-content: center;
            gap: 2.4rem;
            margin-top: 4.8rem;
            flex-wrap: wrap;
        }
        
        .game-btn {
            padding: 1.8rem 4rem;
            font-size: 2rem;
            font-weight: 600;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            min-width: 200px;
            justify-content: center;
        }
        
        .hint-btn {
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            color: white;
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.35);
        }
        
        .back-btn {
            background: rgba(91, 76, 219, 0.12);
            color: var(--primary);
            border: 2px solid var(--primary-light);
        }
        
        .next-btn {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-light));
            color: white;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.35);
        }
        
        .game-btn:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.22);
        }
        
        .game-btn:active:not(:disabled) {
            transform: translateY(-1px);
        }
        
        .game-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .result-container {
            text-align: center;
            max-width: 650px;
            width: 100%;
        }
        
        .result-title {
            font-size: 4.5rem;
            color: var(--primary);
            margin-bottom: 3.6rem;
            font-weight: 700;
        }
        
        .score-display {
            font-size: 9rem;
            font-weight: 700;
            color: var(--secondary);
            margin: 3.6rem 0;
            text-shadow: 0 6px 18px rgba(16, 185, 129, 0.35);
            animation: scorePop 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes scorePop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.25); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .stars-container {
            font-size: 4.5rem;
            color: var(--accent-light);
            margin: 3.6rem 0;
            letter-spacing: 1.2rem;
        }
        
        .feedback-text {
            font-size: 2.4rem;
            color: #555;
            margin: 3.6rem 0;
            line-height: 1.6;
            padding: 2.4rem;
            background: rgba(91, 76, 219, 0.08);
            border-radius: var(--radius-medium);
        }
        
        .result-controls {
            display: flex;
            gap: 2.4rem;
            justify-content: center;
            margin-top: 4.8rem;
            flex-wrap: wrap;
        }
        
        .restart-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        
        .menu-btn {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-light));
            color: white;
        }
        
        .voice-controls {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            margin-top: 2.4rem;
        }
        
        .voice-btn {
            padding: 1.2rem 2.4rem;
            background: white;
            border: 2px solid var(--primary-light);
            border-radius: 36px;
            font-size: 1.7rem;
            color: var(--primary);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .voice-btn:hover {
            background: var(--primary-light);
            color: white;
        }
        
        .voice-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .shape {
            position: absolute;
            background: rgba(91, 76, 219, 0.12);
            border-radius: 50%;
            animation: floatShape 22s infinite linear;
        }
        
        .shape:nth-child(1) {
            width: 120px;
            height: 120px;
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }
        
        .shape:nth-child(2) {
            width: 180px;
            height: 180px;
            top: 60%;
            right: 5%;
            animation-delay: 6s;
        }
        
        .shape:nth-child(3) {
            width: 100px;
            height: 100px;
            bottom: 20%;
            left: 10%;
            animation-delay: 12s;
        }
        
        @keyframes floatShape {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-24px) rotate(180deg); }
            100% { transform: translateY(0) rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            html { font-size: 55%; }
            
            .container {
                min-height: 90vh;
                border-radius: var(--radius-medium);
            }
            
            .header {
                padding: 4rem 3rem 3rem;
            }
            
            .logo-container {
                flex-direction: column;
                gap: 1.8rem;
            }
            
            .title-container h1 {
                font-size: 3.6rem;
            }
            
            .main-content {
                padding: 4rem 3rem;
            }
            
            .level-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 2.4rem;
            }
            
            .question-box {
                padding: 3.6rem 2.4rem;
            }
            
            .question-text {
                font-size: 2.6rem;
            }
            
            .options-grid {
                grid-template-columns: 1fr;
                gap: 2.4rem;
            }
            
            .game-controls, .result-controls {
                flex-direction: column;
                align-items: center;
            }
            
            .game-btn, .result-controls .game-btn {
                width: 100%;
                max-width: 320px;
            }
        }
        
        @media (max-width: 480px) {
            html { font-size: 50%; }
            
            body {
                padding: 12px;
            }
            
            .header {
                padding: 3rem 2rem 2rem;
            }
            
            .logo {
                width: 7rem;
                height: 7rem;
                font-size: 3.2rem;
            }
            
            .title-container h1 {
                font-size: 3.2rem;
            }
            
            .control-bar {
                padding: 2rem;
                flex-direction: column;
                gap: 2rem;
            }
            
            .level-grid {
                grid-template-columns: 1fr;
            }
            
            .score-display {
                font-size: 7rem;
            }
            
            .stars-container {
                font-size: 3.5rem;
                letter-spacing: 0.8rem;
            }
        }
        
        @media (hover: none) and (pointer: coarse) {
            .level-card:hover,
            .option-card:hover,
            .game-btn:hover,
            .control-btn:hover {
                transform: none !important;
            }
            
            .level-card:active,
            .option-card:active,
            .game-btn:active,
            .control-btn:active {
                transform: scale(0.96) !important;
            }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .loading {
            position: relative;
            overflow: hidden;
        }
        
        .loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
            animation: shimmer 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="logo-container">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div class="title-container">
                    <h1>快乐学习园地</h1>
                    <p class="subtitle">专为幼儿设计的全感官互动学习平台</p>
                </div>
            </div>
        </header>

        <div class="control-bar">
            <div class="control-group">
                <button class="control-btn sound-btn active" id="soundToggle" title="开关声音">
                    <i class="fas fa-volume-up"></i>
                </button>
                <button class="control-btn" id="musicToggle" title="背景音乐">
                    <i class="fas fa-music"></i>
                </button>

        const speechController = {
            synth: window.speechSynthesis,
            enabled: true,
            voiceType: 'child',
            
            speak(text) {
                if (!this.enabled || !this.synth) return false;
                try {
                    this.stop();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-CN';
                    
                    switch(this.voiceType) {
                        case 'child': utterance.rate=0.9; utterance.pitch=1.5; break;
                        case 'female': utterance.rate=0.95; utterance.pitch=1.2; break;
                        case 'boy': utterance.rate=0.9; utterance.pitch=1.3; break;
                        default: utterance.rate=0.9; utterance.pitch=1.2;
                    }
                    setTimeout(() => {
                        this.synth.speak(utterance);
                    }, 100);
                    return true;
                } catch (e) { return false; }
            },
            
            stop() { this.synth?.cancel(); },
            toggle() { this.enabled = !this.enabled; return this.enabled; },
            setVoiceType(type) { this.voiceType = type; },
            speakQuestionImmediately(text) {
                if(this.enabled && text) {
                    this.stop();
                    setTimeout(()=>this.speak(text),100);
                }
            }
        };

        const DOM = {
            welcomeScreen: document.getElementById('welcomeScreen'),
            gameScreen: document.getElementById('gameScreen'),
            resultScreen: document.getElementById('resultScreen'),
            soundToggle: document.getElementById('soundToggle'),
            progressBar: document.getElementById('progressBar'),
            progressText: document.getElementById('progressText'),
            levelSelect: document.getElementById('levelSelect'),
            gameTitle: document.getElementById('gameTitle'),
            currentLevelEl: document.getElementById('currentLevel'),

            optionsContainer: document.getElementById('optionsContainer'),
            nextBtn: document.getElementById('nextBtn'),

            startBtn: document.getElementById('startBtn'),

            menuBtn: document.getElementById('menuBtn'),
            voiceButtons: document.querySelectorAll('.voice-btn'),
            finalScore: document.getElementById('finalScore'),
            starsResult: document.getElementById('starsResult'),
            feedbackText: document.getElementById('feedbackText')
        };

        let gameState = {
            currentGame: null, currentGameId: null,
            currentLevel: 0, score: 0,
            selectedOption: null, answered: false, total: 0
        };

        function createParticles() {
            const container = document.getElementById('particles');
            for(let i=0;i<30;i++){
                const p = document.createElement('div');
                p.className='particle';
                p.style.left = Math.random()*100+'vw';
                p.style.width = p.style.height = Math.random()*4+2+'px';
                p.style.animationDelay = Math.random()*20+'s';
                container.appendChild(p);
            }
        }

        function initLevels() {
            DOM.levelSelect.innerHTML = '';
            Object.values(LEARNING_CONTENT).forEach(game=>{
                const card = document.createElement('div');
                card.className='level-card';
                card.innerHTML = `
                    <div class="level-icon" style="background:linear-gradient(135deg,${game.color},${game.color}99)">
                        <i class="${game.icon}"></i>
                    </div>
                    <h3 class="level-name">${game.title}</h3>
                    <p class="level-desc">${game.description}</p>
                    <div class="level-stats"><i class="fas fa-star"></i> ${game.questions.length}题</div>
                `;
                card.onclick = ()=>startGame(game.id);
                DOM.levelSelect.appendChild(card);
            });
            updateProgress();
        }

        const STORAGE_KEY = 'preschoolLearningProgress';
        function getProgress() { return JSON.parse(localStorage.getItem(STORAGE_KEY))||null; }
        function setProgress() {
            if(!gameState.currentGameId) return;
            localStorage.setItem(STORAGE_KEY,JSON.stringify({
                gameId:gameState.currentGameId,
                level:gameState.currentLevel,
                score:gameState.score,
                time:Date.now()
            }));
            updateProgress();
        }

        function updateProgress() {
            const p = getProgress();
            if(p&&p.gameId){
                const g=LEARNING_CONTENT[p.gameId];
                DOM.progressText.textContent=`继续：${g.title}-第${p.level+1}关`;
                DOM.progressBar.style.width = (p.level/g.questions.length)*100+'%';
                DOM.startBtn.innerHTML='<i class="fas fa-play"></i> 继续学习';
            }else{
                DOM.progressText.textContent='欢迎开始学习';
                DOM.progressBar.style.width='0%';
            }
        }

        function showScreen(screenName) {
            ['welcomeScreen','gameScreen','resultScreen'].forEach(s=>DOM[s].classList.remove('active'));
            DOM[screenName].classList.add('active');
            speechController.stop();
        }

        function startGame(gameId) {
            const game = LEARNING_CONTENT[gameId];
            if(!game) return;
            
            const saved = getProgress();
            gameState = {
                currentGame:game, currentGameId:gameId,
                currentLevel: saved?.gameId===gameId ? saved.level : 0,
                score: saved?.gameId===gameId ? saved.score : 0,
                selectedOption:null, answered:false,
                total:game.questions.length
            };

            DOM.gameTitle.textContent = game.title;
            loadQuestion();
            showScreen('gameScreen');
        }

        function loadQuestion() {
            const {currentGame,currentLevel,total} = gameState;
            if(currentLevel >= total) { showResult(); return; }

            const q = currentGame.questions[currentLevel];
            DOM.questionText.textContent = q.question;
            DOM.currentLevelEl.textContent = `第${currentLevel+1}关/共${total}关`;
            DOM.progressBar.style.width = (currentLevel/total)*100+'%';
            DOM.optionsContainer.innerHTML = '';
            gameState.answered = false;
            gameState.selectedOption = null;
            DOM.nextBtn.disabled = true;

            q.options.forEach((opt,i)=>{
                const card = document.createElement('div');
                card.className='option-card';
                card.innerHTML = opt.type==='img' 
                    ? `<div class="option-content">${opt.content}</div><div class="option-label">${opt.word}</div>`
                    : `<div class="option-content" style="font-size:4rem">${opt.display}</div><div class="option-label">数量:${opt.count}</div>`;
                
                card.onclick = ()=>{
                    if(gameState.answered) return;
                    document.querySelectorAll('.option-card').forEach(c=>c.classList.remove('selected'));
                    card.classList.add('selected');
                    gameState.selectedOption = i;
                    DOM.nextBtn.disabled = false;
                    speechController.speak(opt.voice);
                };
                DOM.optionsContainer.appendChild(card);
            });

            setTimeout(()=>speechController.speakQuestionImmediately(q.question),300);
            setProgress();
        }

        function checkAnswer() {
            const {currentGame,currentLevel,selectedOption} = gameState;
            const q = currentGame.questions[currentLevel];
            const correct = selectedOption === q.answer;
            
            gameState.answered = true;
            const cards = document.querySelectorAll('.option-card');
            cards.forEach((c,i)=>{
                if(i===q.answer) c.classList.add('correct');
                else if(i===selectedOption && !correct) c.classList.add('incorrect');
            });

            if(correct) {
                gameState.score +=20;
                speechController.speak('答对啦！真棒！');
                createConfetti();
            }else{
                speechController.speak(`正确答案是：${q.options[q.answer].voice}`);
            }
        }

        function nextQuestion() {
            if(!gameState.answered) checkAnswer();
            setTimeout(()=>{
                gameState.currentLevel++;
                loadQuestion();
            },1500);
        }

        function showResult() {
            const {score,total,currentGame} = gameState;
            const percent = Math.round((score/(total*20))*100);
            const stars = Math.ceil(percent/20);
            
            DOM.finalScore.textContent = percent;
            DOM.starsResult.textContent = '★'.repeat(stars)+'☆'.repeat(5-stars);
            DOM.feedbackText.textContent = percent>=90?'太棒了！':percent>=70?'非常好！':percent>=50?'不错哦！':'继续加油！';
            
            showScreen('resultScreen');
            localStorage.removeItem(STORAGE_KEY);
            setTimeout(()=>speechController.speak(`恭喜完成！得分${percent}分`),500);
        }

        function createConfetti() {
            const colors=['#6a5acd','#20bf6b','#fc5c65','#fd9644'];
            for(let i=0;i<50;i++){
                const c=document.createElement('div');
                c.style.cssText=`position:fixed;width:${Math.random()*8+4}px;height:${Math.random()*8+4}px;background:${colors[Math.random()*4|0]};border-radius:50%;left:${Math.random()*100}%;top:-10px;z-index:999;pointer-events:none`;
                document.body.appendChild(c);
                c.animate([{transform:'translateY(0)'},{transform:`translateY(${innerHeight}px)`,opacity:0}],{duration:2000,easing:'ease-out'}).onfinish=()=>c.remove();
            }
        }

        function initEvents() {
            DOM.soundToggle.onclick = ()=>{
                const on = speechController.toggle();
                DOM.soundToggle.querySelector('i').className = on?'fas fa-volume-up':'fas fa-volume-mute';
            };
            DOM.hintBtn.onclick = ()=>{
                const q=gameState.currentGame.questions[gameState.currentLevel];
                speechController.speak(q.options[q.answer].voice);
            };
            DOM.backBtn.onclick = ()=>showScreen('welcomeScreen');
            DOM.nextBtn.onclick = nextQuestion;
            DOM.restartBtn.onclick = ()=>startGame(gameState.currentGameId);
            DOM.menuBtn.onclick = ()=>showScreen('welcomeScreen');
            DOM.startBtn.onclick = ()=>{
                const p=getProgress();
                p?startGame(p.gameId):startGame('literacy');
            };
            DOM.voiceButtons.forEach(b=>{
                b.onclick=()=>{
                    DOM.voiceButtons.forEach(btn=>btn.classList.remove('active'));
                    b.classList.add('active');
                    speechController.setVoiceType(b.dataset.voice);
                    speechController.speak("声音已切换");
                };
            });
        }

        document.addEventListener('DOMContentLoaded',()=>{
            createParticles();
            initLevels();
            initEvents();
            
            setTimeout(()=>{
                speechController.speak("欢迎来到快乐学习园地，请选择学习主题");
            }, 800);
        });
    </script>
</body>
</html>
